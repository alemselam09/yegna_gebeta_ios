name: Build iOS IPA for Yegna Gebeta

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BeeWare
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS project
        run: briefcase create iOS

      - name: Build iOS app
        run: briefcase build iOS

      # ሁሉንም ፋይሎች እና አቃፊዎች ለማየት (ማረሚያ)
      - name: List all files and folders (debug)
        run: |
          echo "Current directory contents:"
          ls -la
          echo "\nSearching for .ipa files:"
          find . -name "*.ipa" -type f

      # የተገኘውን .ipa ፋይል ሁሉ ለማውረድ (ትክክለኛው መንገድ)
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yegna-gebeta-ipa
          path: '**/*.ipa'   # በማንኛውም ንዑስ አቃፊ ውስጥ ያለ ማንኛውም .ipa ፋይል
