name: Build iOS IPA for Yegna Gebeta

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install BeeWare Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS project
        run: |
          briefcase create iOS

      - name: Build iOS project
        run: |
          briefcase build iOS

      - name: Package iOS app (create IPA)
        run: |
          briefcase package iOS --adhoc-sign

      - name: Debug project structure
        run: |
          echo "==== Listing project structure ===="
          ls -R

      - name: Find IPA file
        id: find_ipa
        run: |
          IPA_PATH=$(find . -name "*.ipa" | head -n 1)

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found. Listing directories for debugging:"
            find .
            exit 1
          fi

          echo "IPA found at $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yegna-gebeta-ios-build
          path: ${{ steps.find_ipa.outputs.ipa_path }}
