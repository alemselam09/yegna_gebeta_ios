name: Build iOS App

on:
  push:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Create iOS project
        run: |
          briefcase create iOS --no-input

      - name: Build iOS
        run: |
          briefcase build iOS

      - name: Package iOS
        run: |
          briefcase package iOS --adhoc-sign

      - name: Show files
        run: |
          echo "Searching IPA..."
          find . -name "*.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            **/*.ipa
