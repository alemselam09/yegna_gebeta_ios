name: Build iOS IPA for Yegna Gebeta

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BeeWare and Toga
        run: |
          python -m pip install --upgrade pip
          pip install "toga[iOS]>=0.4.3" briefcase

      - name: Create iOS project
        run: briefcase create iOS

      - name: Update iOS project
        run: briefcase update iOS

      - name: Build iOS app
        run: briefcase build iOS

      - name: Package iOS app (create .ipa)
        run: briefcase package iOS -u --adhoc-sign

      - name: Find .ipa file
        id: find_ipa
        run: |
          echo "=== Searching for .ipa files ==="
          find . -name "*.ipa" -type f
          IPA_PATH=$(find . -name "*.ipa" -type f | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            echo "✅ IPA found at: $IPA_PATH"
            echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          else
            echo "❌ IPA file not found!"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yegna-gebeta-ipa
          path: ${{ steps.find_ipa.outputs.ipa_path }}
          if-no-files-found: error
