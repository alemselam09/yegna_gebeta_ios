name: Build iOS IPA

on:
  push:
    branches: ["main"]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create iOS project
        run: briefcase create iOS --no-input

      - name: Build iOS
        run: briefcase build iOS

      - name: Package iOS
        run: briefcase package iOS --adhoc-sign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: yegna-gebeta-ipa
          path: "**/*.ipa"
